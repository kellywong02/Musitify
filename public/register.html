<!DOCTYPE html>

<html>
<head>

<title>Musitify - Register</title>

<style>

:root {
    --primary: #FF00FF;
    --background: #100018;
    --card: rgba(24,24,24,0.85);
    --input: #2a1730;
    --text: white;
    --secondary: #b3b3b3;
}

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {

    margin:0;
    min-height:100vh;

    background:
    radial-gradient(
        circle at top left,
        var(--primary),
        transparent 35%
    ),
    linear-gradient(
        135deg,
        #050005,
        #1a0025
    );

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}


.container {

    width:450px;

    background:var(--card);

    padding:45px;

    border-radius:25px;

    backdrop-filter:blur(15px);

    box-shadow:
    0 0 45px rgba(255,0,255,.35);

    animation:fade .5s ease;

}


@keyframes fade {

    from {
        opacity:0;
        transform:translateY(20px);
    }

    to {
        opacity:1;
        transform:translateY(0);
    }

}


.logo {

    text-align:center;

    color:white;

    font-size:38px;

    font-weight:bold;

    margin-bottom:10px;

}


.subtitle {

    text-align:center;

    color:var(--secondary);

    margin-bottom:35px;

}


.form-group {

    margin-bottom:18px;

}


input {

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:var(--input);

    color:white;

    font-size:15px;

    transition:.3s;

}


input::placeholder {

    color:#aaa;

}


input:focus {

    outline:none;

    box-shadow:
    0 0 15px var(--primary);

}


button {

    width:100%;

    padding:15px;

    border:none;

    border-radius:30px;

    background:
    linear-gradient(
        90deg,
        #ff00ff,
        #ff66ff
    );

    color:white;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}


button:hover {

    transform:scale(1.05);

    box-shadow:
    0 0 25px var(--primary);

}


.login-link {

    text-align:center;

    margin-top:25px;

    color:var(--secondary);

}


.login-link a {

    color:var(--primary);

    text-decoration:none;

    font-weight:bold;

}


#msg {

    margin-top:20px;

    text-align:center;

    font-weight:bold;

}


.success {

    color:#ff66ff;

}


.error {

    color:#ff6b6b;

}

</style>

</head>


<body>


<div class="container">


<div class="logo">
🎵 Musitify
</div>


<div class="subtitle">
Create your account and start listening
</div>


<div class="form-group">
<input 
id="username"
placeholder="Username">
</div>


<div class="form-group">
<input 
id="email"
type="email"
placeholder="Email Address">
</div>


<div class="form-group">
<input 
id="password"
type="password"
placeholder="Password">
</div>


<div class="form-group">
<input 
id="confirmPassword"
type="password"
placeholder="Confirm Password">
</div>


<button onclick="register()">
Create Account
</button>


<div class="login-link">

Already have an account?

<a href="login.html">
Login
</a>

</div>


<div id="msg"></div>


</div>



<script>

async function register() {


    const message =
    document.getElementById('msg');


    if (
        password.value !== confirmPassword.value
    ) {

        message.className =
        "error";

        message.innerText =
        "Passwords do not match";

        return;

    }



    const response =
    await fetch('/register', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            username:
            username.value,

            email:
            email.value,

            password:
            password.value

        })

    });



    const data =
    await response.json();



    if(response.ok){


        message.className =
        "success";


        message.innerText =
        "Registration successful! Redirecting...";


        setTimeout(()=>{

            window.location.href =
            "login.html";

        },1500);


    }
    else {


        message.className =
        "error";


        message.innerText =
        data.message;


    }


}


</script>


</body>

</html>
