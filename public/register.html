<!DOCTYPE html>

<html>
<head>

<title>Musitify - Register</title>

<link rel="stylesheet" href="styles.css">

</head>


<body class="auth-page register-page">


<div class="container">


<div class="logo">
🎵 Musitify
</div>


<div class="subtitle">
Create your account and start listening
</div>


<div class="form-group">
<input 
id="username"
required
placeholder="Username">
</div>


<div class="form-group">
<input 
id="email"
type="email"
required
placeholder="Email Address">
</div>


<div class="form-group">
<input 
id="password"
type="password"
required
placeholder="Password">
</div>


<div class="form-group">
<input 
id="confirmPassword"
type="password"
required
placeholder="Confirm Password">
</div>


<button onclick="register()">
Create Account
</button>


<div class="login-link">

Already have an account?

<a href="login.html">
Login
</a>

</div>


<div id="msg"></div>


</div>



<script>
function getApiUrl(path) {
    if (location.protocol === 'file:') {
        return `http://localhost:3000${path}`;
    }

    return path;
}

async function register() {


    const message =
    document.getElementById('msg');
    const safeUsername =
    username.value.trim();
    const safeEmail =
    email.value.trim();
    const safePassword =
    password.value.trim();
    const safeConfirmPassword =
    confirmPassword.value.trim();


    if (
        !safeUsername ||
        !safeEmail ||
        !safePassword ||
        !safeConfirmPassword
    ) {

        message.className =
        "error";

        message.innerText =
        "Please fill in all fields";

        return;

    }


    if (
        safePassword !== safeConfirmPassword
    ) {

        message.className =
        "error";

        message.innerText =
        "Passwords do not match";

        return;

    }



    try {
    const response =
    await fetch(getApiUrl('/register'), {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            username:
            safeUsername,

            email:
            safeEmail,

            password:
            safePassword

        })

    });



    const data =
    await response.json();



    if(response.ok){


        message.className =
        "success";


        message.innerText =
        "Registration successful! Redirecting...";


        setTimeout(()=>{

            window.location.href =
            "login.html";

        },1500);


    }
    else {


        message.className =
        "error";


        message.innerText =
        data.message;


    }
    } catch (error) {
        message.className =
        "error";

        message.innerText =
        "Cannot connect to the server. Open http://localhost:3000/register.html and make sure node server.js is running.";
    }


}


</script>


</body>

</html>
