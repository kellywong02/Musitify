<!DOCTYPE html>
<html>

<head>

<title>Musitify Login</title>

<style>

:root {
    --primary:#FF00FF;
    --background:#100018;
    --card:rgba(24,24,24,.85);
    --input:#2a1730;
    --text:white;
    --secondary:#b3b3b3;
}


* {
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body {

    margin: 0;

    height: 100vh;

    background:
    radial-gradient(
        circle at top left,
        #FF00FF,
        transparent 35%
    ),
    linear-gradient(
        135deg,
        #050005,
        #1a0025
    );

    display: flex;
    justify-content: center;
    align-items: center;
}



.container {

    width:420px;

    background:var(--card);

    padding:45px;


    border-radius:25px;


    backdrop-filter:blur(15px);


    box-shadow:
    0 0 45px rgba(255,0,255,.35);


    text-align:center;


    animation:fade .5s ease;

}



@keyframes fade {

    from {

        opacity:0;

        transform:translateY(20px);

    }


    to {

        opacity:1;

        transform:translateY(0);

    }

}



.logo {

    font-size:40px;

    font-weight:bold;

    color:white;

    margin-bottom:10px;

}



.subtitle {

    color:var(--secondary);

    margin-bottom:35px;

}



input {

    width:100%;

    padding:15px;

    margin-bottom:18px;


    border:none;

    border-radius:15px;


    background:var(--input);

    color:white;


    font-size:15px;


    transition:.3s;

}



input::placeholder {

    color:#aaa;

}



input:focus {

    outline:none;

    box-shadow:
    0 0 15px var(--primary);

}



button {

    width:100%;

    padding:15px;


    border:none;

    border-radius:30px;


    background:
    linear-gradient(
        90deg,
        #ff00ff,
        #ff66ff
    );


    color:white;


    font-size:17px;

    font-weight:bold;


    cursor:pointer;


    transition:.3s;

}



button:hover {

    transform:scale(1.05);


    box-shadow:
    0 0 25px var(--primary);

}



p {

    margin-top:25px;

    color:var(--secondary);

}



a {

    color:var(--primary);

    text-decoration:none;

    font-weight:bold;

}



#msg {

    margin-top:20px;

    color:#ff6b6b;

    font-weight:bold;

}


</style>

</head>


<body>


<div class="container">


<div class="logo">
🎵 Musitify
</div>


<div class="subtitle">
Login and continue listening
</div>



<input 
id="email"
placeholder="Email Address">



<input 
id="password"
type="password"
placeholder="Password">



<button onclick="login()">
Login
</button>



<p>

Don't have an account?

<a href="register.html">
Register
</a>

</p>



<div id="msg"></div>


</div>





<script>

async function login() {


    const res =
    await fetch('/login', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            email:
            email.value,


            password:
            password.value

        })


    });



    const data =
    await res.json();



    if (res.ok) {

    localStorage.setItem(
        "user",
        JSON.stringify(data.user)
    );

    location.href = "music.html";
    }   
    else {


        document
        .getElementById("msg")
        .innerText =
        data.message;


    }


}


</script>


</body>

</html>
