<!DOCTYPE html>
<html>
<head>
<title>Musitify Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page login-page">
<div class="container">
<div class="logo">🎵 Musitify</div>
<div class="subtitle">Login and continue listening</div>
<div class="form-group">
<input id="email" placeholder="Email Address">
</div>
<div class="form-group">
<input id="password" type="password" placeholder="Password">
</div>
<button onclick="login()">Login</button>
<p>Don't have an account? <a href="register.html">Register</a></p>
<div id="msg"></div>
</div>
<script>
function getApiUrl(path) {
    if (location.protocol === 'file:') {
        return `http://localhost:3000${path}`;
    }

    return path;
}

async function login() {
    const message = document.getElementById("msg");

    try {
        const res = await fetch(getApiUrl('/login'), {
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                email: email.value,
                password: password.value
            })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.removeItem("musitifyPlaybackState");
            sessionStorage.removeItem("musitifyAutoplayNextPage");
            localStorage.setItem("user", JSON.stringify(data.user));
            location.href = "home.html";
        } else {
            message.innerText = data.message;
        }
    } catch (error) {
        message.innerText = "Cannot connect to the server. Open http://localhost:3000/login.html and make sure node server.js is running.";
    }
}
</script>
</body>
</html>
