<!DOCTYPE html>
<html>
<head>
    <title>Musitify</title>

    <style>
        :root {
            --primary: #FF00FF;
            --bg: #07000d;
            --card: rgba(24, 24, 24, 0.85);
            --card-hover: #2a1730;
            --text: #ffffff;
            --secondary: #b3b3b3;
            --input: #2a1730;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, var(--primary), transparent 30%),
                linear-gradient(135deg, #050005, #1a0025);
            color: var(--text);
            min-height: 100vh;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            position: fixed;
            left: 0;
            top: 0;
            padding: 28px;
            border-right: 1px solid rgba(255, 0, 255, 0.25);
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 40px;
            color: var(--primary);
            text-shadow: 0 0 18px var(--primary);
        }

        .menu {
            color: var(--secondary);
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu:hover {
            color: white;
            transform: translateX(5px);
        }

        .main {
            margin-left: 230px;
            padding: 35px;
            padding-bottom: 130px;
        }

        .hero {
            background:
                linear-gradient(135deg, rgba(255,0,255,0.9), rgba(40,0,55,0.95));
            padding: 40px;
            border-radius: 28px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(255,0,255,0.3);
        }

        .hero h1 {
            margin: 0;
            font-size: 46px;
        }

        .hero p {
            color: #f2d7ff;
            font-size: 17px;
        }

        .search {
            width: 100%;
            max-width: 460px;
            padding: 15px 18px;
            border-radius: 30px;
            border: none;
            margin-bottom: 28px;
            background: var(--input);
            color: white;
            outline: none;
        }

        .search:focus {
            box-shadow: 0 0 15px var(--primary);
        }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 24px;
        }

        .song-card {
            background: var(--card);
            border-radius: 22px;
            padding: 18px;
            transition: 0.25s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .song-card:hover {
            background: var(--card-hover);
            transform: translateY(-6px);
            box-shadow: 0 0 25px rgba(255,0,255,0.25);
        }

        .cover {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 16px;
            background: #333;
        }

        .song-title {
            font-size: 18px;
            font-weight: bold;
        }

        .artist {
            color: var(--secondary);
            margin-top: 6px;
        }

        .duration {
            color: #d8a7ff;
            font-size: 13px;
            margin-top: 5px;
        }

        .play-btn {
            margin-top: 16px;
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff00ff, #ff66ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }

        .player {
            position: fixed;
            bottom: 0;
            left: 230px;
            right: 0;
            background: rgba(24,24,24,0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,0,255,0.3);
            padding: 18px 30px;
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .now-playing {
            min-width: 240px;
        }

        .now-title {
            font-weight: bold;
        }

        .now-artist {
            color: var(--secondary);
            font-size: 14px;
        }

        audio {
            width: 100%;
        }
        .custom-player {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 15px;
    }

    .custom-player button {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        background: #FF00FF;
        color: white;
        font-size: 18px;
        cursor: pointer;
    }

    #progressBar {
        flex: 1;
        accent-color: #FF00FF;
    }

    #timeDisplay {
        color: #b3b3b3;
        font-size: 14px;
    }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        🎵 Musitify
    </div>
    <div class="profile">
        <div class="avatar">
            👤
        </div>
        <div id="profileName">
            Loading...
        </div>
        <small id="profileEmail">
        </small>
    </div>
    <div class="menu">
        🏠 Home
    </div>
    <div class="menu">
        🔍 Search
    </div>
    <div class="menu">
        ❤️ Favorites
    </div>
    <div class="menu">
        📀 Playlists
    </div>
    <button 
    class="logout"
    onclick="logout()">
        🚪 Logout
    </button>
</div>

<div class="main">
    <div class="hero">

    <h1>
        Welcome back, 
        <span id="welcomeName"></span>
    </h1>

    <p>
        Listen to your favorite songs anytime.
    </p>

</div>

    <input
        class="search"
        id="searchInput"
        placeholder="Search songs or artists..."
        oninput="filterSongs()"
    >

    <div class="song-grid" id="songList"></div>
</div>

<div class="player">
    <div class="now-playing">
        <div class="now-title" id="nowTitle">No song selected</div>
        <div class="now-artist" id="nowArtist">Choose a song to play</div>
    </div>

<audio 
    id="audioPlayer"
    controlsList="nodownload noplaybackrate"
    disableRemotePlayback
    oncontextmenu="return false;"
    hidden>
</audio>
<div class="custom-player">
    <button onclick="togglePlay()" id="playPauseBtn">▶</button>
    <input 
        type="range" 
        id="progressBar" 
        value="0" 
        min="0" 
        max="100"
        oninput="seekSong()"
    >
    <span id="timeDisplay">0:00 / 0:00</span>
</div>
</div>

<script>
let allSongs = [];
let currentSongIndex = 0;

document.getElementById('audioPlayer').addEventListener('ended', function () {
    currentSongIndex++;

    if (currentSongIndex >= allSongs.length) {
        currentSongIndex = 0;
    }

    const nextSong = allSongs[currentSongIndex];

    playSong(
        nextSong.title,
        nextSong.artist,
        nextSong.file_url
    );
});

async function loadSongs() {
    const response = await fetch('/songs');
    allSongs = await response.json();
    renderSongs(allSongs);
}

function renderSongs(songs) {
    const container = document.getElementById('songList');
    container.innerHTML = '';

    songs.forEach(song => {
        container.innerHTML += `
            <div class="song-card">
                <img
                    class="cover"
                    src="${song.cover_url || 'https://via.placeholder.com/300'}"
                >

                <div class="song-title">
                    ${song.title}
                </div>

                <div class="artist">
                    ${song.artist}
                </div>

                <div class="duration">
                    ${song.duration || ''}
                </div>

                <button class="play-btn" onclick="
                    playSong(
                        '${song.title}',
                        '${song.artist}',
                        '${song.file_url}'
                    )
                ">
                    ▶ Play
                </button>
            </div>
        `;
    });
}

const audio = document.getElementById('audioPlayer');
const progressBar = document.getElementById('progressBar');
const timeDisplay = document.getElementById('timeDisplay');
const playPauseBtn = document.getElementById('playPauseBtn');

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playPauseBtn.innerText = "⏸";
    } else {
        audio.pause();
        playPauseBtn.innerText = "▶";
    }
}

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;

    progressBar.value = (audio.currentTime / audio.duration) * 100;

    timeDisplay.innerText =
        formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
});

function seekSong() {
    if (!audio.duration) return;

    audio.currentTime = (progressBar.value / 100) * audio.duration;
}

function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${min}:${sec}`;
}

function playSong(title, artist, fileUrl) {
    if (!fileUrl) {
        alert("No music file found for this song.");
        return;
    }

    document.getElementById('nowTitle').innerText = title;
    document.getElementById('nowArtist').innerText = artist;

    currentSongIndex = allSongs.findIndex(song => song.file_url === fileUrl);

    audio.pause();
    audio.removeAttribute("src");
    audio.load();

    audio.src = fileUrl;
    audio.load();

    audio.play()
        .then(() => {
            playPauseBtn.innerText = "⏸";
        })
        .catch(error => {
            console.log("Audio play failed:", error);
        });
}

audio.addEventListener('ended', function () {
    playPauseBtn.innerText = "▶";
    progressBar.value = 0;
    timeDisplay.innerText = "0:00 / 0:00";
});

function filterSongs() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allSongs.filter(song =>
        song.title.toLowerCase().includes(keyword) ||
        song.artist.toLowerCase().includes(keyword)
    );

    renderSongs(filtered);
}

loadSongs();
function loadProfile(){

    const user =
    JSON.parse(
        localStorage.getItem("user")
    );


    if(!user){

        location.href =
        "login.html";

        return;

    }


    // Sidebar profile
    document.getElementById(
        "profileName"
    ).innerText =
    user.username;


    document.getElementById(
        "profileEmail"
    ).innerText =
    user.email;



    // Welcome message
    document.getElementById(
        "welcomeName"
    ).innerText =
    user.username;
}



function logout(){


    localStorage.removeItem(
        "user"
    );


    location.href =
    "login.html";


}


loadProfile();
</script>

</body>
</html>
